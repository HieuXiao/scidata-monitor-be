services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: scidata_user
      POSTGRES_PASSWORD: scidata_password
      POSTGRES_DB: scidata
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker.celery_app worker --loglevel=info

  celery_beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
